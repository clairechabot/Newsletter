<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Curated Canopy — Full Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif; background:#F9F7F2;
    color:#2C3E50; line-height:1.6; }
  .wrap { max-width:1000px; margin:0 auto; padding:28px 18px 64px; }
  header { text-align:center; margin-bottom:24px; }
  .brand { font-size:40px; }
  h1 { font-family:'Playfair Display',Georgia,serif; font-size:30px; color:#5D6D7E; margin:6px 0; }
  .greeting { color:#7A8794; font-style:italic; max-width:640px; margin:8px auto 0; }
  .date { color:#A9A39A; font-size:13px; margin-top:6px; }
  /* Tabs */
  .tabs { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:24px 0; }
  .tab { padding:9px 18px; border-radius:24px; border:1px solid #D9D3C7; background:#fff;
    cursor:pointer; font-weight:bold; font-size:14px; color:#5D6D7E; }
  .tab.active { background:#5D6D7E; color:#fff; border-color:#4A5763; }
  .panel { display:none; }
  .panel.active { display:block; }
  /* Genre filter */
  .genres { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:18px; }
  .genre { padding:5px 12px; border-radius:18px; border:1px solid #D9D3C7; background:#fff;
    cursor:pointer; font-size:12px; color:#7A8794; }
  .genre.active { background:#87A878; color:#fff; border-color:#6E9162; }
  /* Carousel */
  .carousel { position:relative; }
  .track { display:flex; gap:16px; overflow-x:auto; scroll-behavior:smooth;
    -webkit-overflow-scrolling:touch; padding:6px 2px 16px; scroll-snap-type:x mandatory; }
  .arrow { position:absolute; top:38%; transform:translateY(-50%); z-index:5; border:none;
    background:rgba(93,109,126,.92); color:#fff; width:40px; height:40px; border-radius:50%;
    font-size:18px; cursor:pointer; }
  .arrow.left { left:-6px; } .arrow.right { right:-6px; }
  /* Cards */
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
  .card { flex:0 0 auto; width:230px; scroll-snap-align:start; background:#fff;
    border:1px solid #E0E0E0; border-radius:14px; overflow:hidden; }
  .grid .card { width:auto; }
  .card a { color:#2C3E50; text-decoration:none; display:block; }
  .cover { width:100%; height:200px; object-fit:cover; display:block; background:#EFECE4; }
  .cover-tile { width:100%; height:150px; display:flex; align-items:center; justify-content:center;
    font-size:54px; background:linear-gradient(135deg,#EFE9DD,#E3EDE0); }
  .body { padding:12px 14px 16px; }
  .badge { font-size:10px; color:#87A878; font-weight:bold; text-transform:uppercase; letter-spacing:.4px; }
  .title { font-weight:bold; font-size:15px; margin:5px 0; line-height:1.35; }
  .note { font-size:13px; color:#7A8794; }
  .empty { text-align:center; color:#A9A39A; padding:40px 0; }
  footer { text-align:center; color:#A9A39A; font-size:12px; margin-top:40px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">🍞🌿🐚</div>
    <h1>The Curated Canopy</h1>
    <div class="greeting" id="greeting"></div>
    <div class="date">Friday, June 5, 2026 · 20:00</div>
  </header>

  <div class="tabs" id="tabs"></div>

  <div class="panel active" data-panel="music">
    <div class="genres" id="genres"></div>
    <div class="carousel">
      <button class="arrow left"  onclick="slide(-1)">‹</button>
      <div class="track" id="music-track"></div>
      <button class="arrow right" onclick="slide(1)">›</button>
    </div>
  </div>
  <div class="panel" data-panel="videos"><div class="grid" id="videos-grid"></div></div>
  <div class="panel" data-panel="good_news"><div class="grid" id="good_news-grid"></div></div>
  <div class="panel" data-panel="discovery"><div class="grid" id="discovery-grid"></div></div>

  <footer>Generated automatically · Curated by Claude · Fern | The Morning Crust</footer>
</div>

<script id="data" type="application/json">{"is_am": false, "greeting": "The sunset has done its work and the tabs can wait \u2014 pour something warm and let tonight's mix of medieval mischief, honeybee medicine, and saved spoonbills settle over you like a good last chapter.", "music": [], "videos": [{"title": "Medieval Historian Reviews A Knight's Tale (2001)", "note": "Historian Matt Lewis watches A Knight's Tale with full knowledge that it's anachronistic nonsense \u2014 and that's precisely the point. Rather than a dry accuracy checklist, the conversation explores what the film gets wrong, what it surprisingly gets right, and whether historical authenticity even matters for a movie that opens with a crowd chanting Queen. A useful watch if you've ever argued about whether fun and accuracy can coexist.", "video_id": "6yh-b2onRPw", "channel": "History Hit", "theme": "Dust Off the History Books"}, {"title": "Escape from Elba: 1815", "note": "The History Guy focuses tightly on the 10-month window between Napoleon's exile to Elba and his dramatic return to France \u2014 a story that tends to get glossed over in broader Napoleon narratives. At 16 minutes, it covers the logistics and audacity of the escape with the kind of specific detail (the size of his guard, the timing of the allied squabbling) that makes the whole thing feel improbable in the best way.", "video_id": "6ynSA0uZ704", "channel": "The History Guy: History Deserves to Be Remembered", "theme": "Dust Off the History Books"}, {"title": "Body language expert: 7 cues that make you instantly more likable | Full Interview", "note": "This is less about charm hacks and more about the specific nonverbal signals \u2014 posture, eyebrow movement, vocal pacing \u2014 that register as warmth or threat before you've said a word. The full interview format gives the expert room to explain the research behind each cue rather than just listing tips, which makes the advice feel grounded rather than performative.", "video_id": "d_YZWaSeHws", "channel": "Big Think", "theme": "The Invisible Script"}, {"title": "The Boy Mom Epidemic is Coming For Us All", "note": "Jessica Kellgren-Fozard unpacks the \"boy mom\" identity as a cultural phenomenon \u2014 not just a social media aesthetic, but a lens into how gender, motherhood, and identity get tangled together online. At nearly 50 minutes it's a longer sit, but her approach is thoughtful rather than outrage-driven, and she brings her usual mix of personal perspective and structural critique.", "video_id": "_rtGcIZKTqo", "channel": "Jessica Kellgren-Fozard", "theme": "The Invisible Script"}, {"title": "This makes absolutely NO SENSE to me", "note": "Alyssa Grenfell and Haley Rawle dig into Hulu's expansion of The Secret Lives of Mormon Wives with a new Orange County spin-off, and the cast announcement is already stirring up questions about authenticity and franchising. If you're following the franchise or curious about how reality TV ecosystems grow (and sometimes cannibalize themselves), this is a grounded conversation rather than a hype recap.", "video_id": "LVRxzJDsmQs", "channel": "Alyssa Grenfell", "theme": "Reality Check, Aisle Five"}], "good_news": [{"title": "In the Land of Infrastructure Projects, Activists and Nature Lovers Saved Endangered Spoonbill Habitat", "note": "When communities rally around a threatened wetland, even the momentum of large infrastructure can be redirected \u2014 proof that determined local voices genuinely can protect the wild places that matter. The spoonbill's habitat standing intact is a quiet, lasting victory for every species that depends on it.", "url": "https://www.goodnewsnetwork.org/in-the-land-of-infrastructure-projects-activists-and-nature-lovers-saved-endangered-spoonbill-habitat/", "source": "Good News Network"}, {"title": "Mom of toddlers shares \u201chuge\u201d behavior results 2 months after taking their iPads away", "note": "One family's honest experiment is a reminder that small, deliberate changes at home can open up real space for children to reconnect with the world around them. It's an encouraging nudge for any parent wondering whether it's worth trying.", "url": "https://www.upworthy.com/mom-of-toddlers-shares-huge-behavior-results-2-months-after-taking-their-ipads-away/", "source": "Upworthy"}], "discovery": [{"title": "Viller M\u00fchle in Goch, Germany", "note": "A mill that has hummed along since the 1200s is remarkable enough \u2014 but somehow it took a puppeteer to turn it into a place that feels genuinely bewitched. Whatever Heinz B\u00f6hmler collected and conjured here, it outlasted any customs check on strangeness.", "url": "https://www.atlasobscura.com/places/viller-muhle", "source": "Atlas Obscura", "category": "history"}, {"title": "The Andr\u00e9e Monument in Solna, Sweden", "note": "Three men vanished into the Arctic sky in a hydrogen balloon and simply ceased to exist \u2014 no wreckage, no word, nothing \u2014 for thirty-three years, until their frozen camp was found with photographs still intact and waiting to be developed.", "url": "https://www.atlasobscura.com/places/the-andree-monument", "source": "Atlas Obscura", "category": "history"}, {"title": "NASA declares MAVEN, its Mars atmosphere orbiter, dead", "note": "MAVEN spent a decade piecing together Mars's slow, irreversible exhale \u2014 the story of how a planet with rivers and rain was quietly robbed of everything by the solar wind, one molecule at a time.", "url": "https://www.sciencenews.org/article/nasa-maven-mars-atmosphere-dead", "source": "Science News", "category": "science"}, {"title": "Honeybees and shrimp are now getting vaccinated", "note": "It turns out the concept of vaccination quietly works beyond backbones entirely \u2014 and a shrimp farm may be one of the more unexpected frontiers in immunology right now.", "url": "https://www.sciencenews.org/article/honeybees-and-shrimp-getting-vaccinated", "source": "Science News", "category": "science"}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
document.getElementById('greeting').textContent = DATA.greeting || '';

const PANELS = [
  {key:'music',     label:'🎵 Music'},
  {key:'videos',    label:'▶ Watch'},
  {key:'good_news', label:'🌿 Good News'},
  {key:'discovery', label:'📜 Discovery'},
];
const tabs = document.getElementById('tabs');
PANELS.forEach((p, i) => {
  const b = document.createElement('div');
  b.className = 'tab' + (i === 0 ? ' active' : '');
  b.textContent = p.label;
  b.onclick = () => selectTab(p.key, b);
  tabs.appendChild(b);
});
function selectTab(key, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(pl =>
    pl.classList.toggle('active', pl.dataset.panel === key));
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"'`]/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','`':'&#96;'
  }[c]));
}
function safeUrl(u) {
  try {
    const p = new URL(u, location.href);
    return ['http:','https:','mailto:'].includes(p.protocol) ? p.href : '#';
  } catch (e) { return '#'; }
}
function coverHTML(url, emoji) {
  return url ? `<img class="cover" src="${esc(safeUrl(url))}" alt="">`
             : `<div class="cover-tile">${emoji}</div>`;
}
function cardHTML(it, emoji) {
  return `<div class="card"><a href="${esc(safeUrl(it.url))}" target="_blank">${coverHTML(it.cover, emoji)}`
    + `<div class="body"><div class="badge">${esc(it.source || it.theme || '')}</div>`
    + `<div class="title">${esc(it.title)}</div><div class="note">${esc(it.note)}</div></div></a></div>`;
}

// Grids
function fillGrid(id, items, emoji) {
  const el = document.getElementById(id);
  el.innerHTML = items.length
    ? items.map(it => cardHTML(it, emoji)).join('')
    : '<div class="empty">Nothing here in this edition.</div>';
}
fillGrid('videos-grid', DATA.videos.map(v => ({...v, url:'https://www.youtube.com/watch?v=' + v.video_id, cover:'https://img.youtube.com/vi/' + v.video_id + '/hqdefault.jpg'})), '▶');
fillGrid('good_news-grid', DATA.good_news, '🌿');
fillGrid('discovery-grid', DATA.discovery, '📜');

// Music carousel + genre filter
const GENRES = [...new Set(DATA.music.map(m => (m.genre || '').trim()).filter(Boolean))];
let activeGenre = null;
const genresEl = document.getElementById('genres');
function renderGenres() {
  const all = [{g:null, label:'All'}].concat(GENRES.map(g => ({g, label:g})));
  genresEl.innerHTML = all.map(x =>
    `<div class="genre ${x.g === activeGenre ? 'active' : ''}" data-g="${esc(x.g || '')}">${esc(x.label)}</div>`
  ).join('');
  genresEl.querySelectorAll('.genre').forEach(el => el.onclick = () => {
    activeGenre = el.dataset.g || null; renderGenres(); renderMusic();
  });
}
function renderMusic() {
  const track = document.getElementById('music-track');
  const items = activeGenre
    ? DATA.music.filter(m => (m.genre || '').trim() === activeGenre)
    : DATA.music;
  track.innerHTML = items.length
    ? items.map(it => cardHTML(it, '🎵')).join('')
    : '<div class="empty">No tracks match that genre in this edition.</div>';
}
function slide(dir) {
  document.getElementById('music-track').scrollBy({left: dir * 260, behavior:'smooth'});
}
renderGenres();
renderMusic();
</script>
</body>
</html>
