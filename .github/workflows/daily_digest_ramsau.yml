name: Ramsau am Dachstein Edition

# WEEKLY regional re-send of the primary Curated Canopy for a reader in Ramsau am
# Dachstein, Austria (Central European Time). Per the reader's request this edition
# goes out ONCE A WEEK — Sunday morning — rather than twice daily. It does NOT
# re-fetch or re-curate: it reuses the primary edition's committed curated_data.json
# and re-localizes "From the Garden" and The Larder's seasonal food note, then emails
# the EMAIL_TO_RAMSAU list. No local news block. No web publish, no history writes.
#
# FERN_TONE keeps Fern drier for this reader (feedback: openings too sweet, too much
# Dachstein-praise) — it only affects the pieces this re-send regenerates.
#
# Timing: same time zone as the Zürich source, whose morning content commits
# ~06:15 UTC (~08:15 local), so Sunday's send fires 06:23 UTC and lands
# ~08:30–10:00 local (a true 07:00 isn't possible with the re-send model).

on:
  schedule:
    - cron: "23 6 * * 0"    # Sunday morning — just after the day's content commits
  workflow_dispatch:

jobs:
  ramsau-edition:
    name: Ramsau am Dachstein weekly re-send
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Vienna
      EDITION_TZ: Europe/Vienna
      GARDEN_LOCALE: "Ramsau am Dachstein, Austria"
      FERN_TONE: "Drier and more matter-of-fact; skip flowery warmth and superlatives (a light wry touch is fine). Do NOT gush about the Dachstein or the local scenery — mention local geography sparingly and vary it, never as the centerpiece."

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --quiet -r requirements.txt
          pip install --quiet anthropic google-api-python-client python-dateutil requests beautifulsoup4

      - name: Re-localize + send the Ramsau am Dachstein edition
        env:
          CLAUDE_API_KEY:        ${{ secrets.CLAUDE_API_KEY }}
          EMAIL_USER:            ${{ secrets.EMAIL_USER }}
          SMTP_USER:             ${{ secrets.SMTP_USER }}
          SMTP_PASS:             ${{ secrets.SMTP_PASS }}
          SMTP_HOST:             ${{ secrets.SMTP_HOST }}
          SMTP_SERVER:           ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:             ${{ secrets.SMTP_PORT }}
          EMAIL_TO:              ${{ secrets.EMAIL_TO_RAMSAU }}
          RECIPIENT_NAME:        ${{ secrets.RECIPIENT_NAME_RAMSAU }}
        run: python renderer.py --regional
