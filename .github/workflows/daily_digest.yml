name: Daily Newsletter Digest

on:
  schedule:
    # GitHub delays on-the-hour crons heavily (often 1-3h), so these fire early
    # at an off-hour minute and let the delay land the email near the target:
    # morning target ≤07:30 Zurich, evening target ≤18:00 Zurich.
    # 05:23 Zurich summer (CEST = UTC+2) → 03:23 UTC. Winter (CET) runs 1h earlier.
    - cron: "23 3 * * *"
    # 16:23 Zurich summer (CEST = UTC+2) → 14:23 UTC.
    - cron: "23 14 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  digest:
    name: Fetch · Curate · Render · Send
    runs-on: ubuntu-latest

    # Silence Node.js deprecation warnings from action wrappers
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TZ: Europe/Zurich

    # Required so the memory step can push history.json back
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Dependency cache ──────────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --quiet -r requirements.txt
          pip install --quiet anthropic google-api-python-client python-dateutil requests beautifulsoup4

      # ── 5. Fetch & Curate ────────────────────────────────────────────────
      - name: Fetch YouTube + Music + Good News, curate with Claude
        env:
          YOUTUBE_API_KEY:    ${{ secrets.YOUTUBE_API_KEY }}
          CLAUDE_API_KEY:     ${{ secrets.CLAUDE_API_KEY }}
        run: python fetcher.py

      # ── 6. Render HTML + Send email ──────────────────────────────────────
      - name: Render newsletter and send
        env:
          # Needed by webpage._autotag_grove() — every edition's new Grove items
          # are mood-tagged during this step so they're sortable immediately.
          CLAUDE_API_KEY:        ${{ secrets.CLAUDE_API_KEY }}
          # Sender credentials — support both naming conventions
          EMAIL_USER:            ${{ secrets.EMAIL_USER }}
          SMTP_USER:             ${{ secrets.SMTP_USER }}
          SMTP_PASS:             ${{ secrets.SMTP_PASS }}
          # Server — support both naming conventions
          SMTP_HOST:             ${{ secrets.SMTP_HOST }}
          SMTP_SERVER:           ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:             ${{ secrets.SMTP_PORT }}
          # Recipients — support all common naming conventions
          EMAIL_TO:              ${{ secrets.EMAIL_TO }}
          NEWSLETTER_RECIPIENTS: ${{ secrets.NEWSLETTER_RECIPIENTS }}
          RECIPIENTS:            ${{ secrets.RECIPIENTS }}
        run: python renderer.py

      # ── 7. Upload HTML artifact ──────────────────────────────────────────
      - name: Upload newsletter HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ github.run_id }}
          path: newsletter.html
          retention-days: 7

      # ── 7b. Publish the full edition to the PUBLIC Pages repo ────────────
      #   Needs a secret EDITION_DEPLOY_TOKEN = a fine-grained PAT with
      #   Contents:write on clairechabot/canopy-edition. Skips quietly if absent.
      - name: Publish full edition to public site
        if: always()
        continue-on-error: true
        env:
          EDITION_DEPLOY_TOKEN: ${{ secrets.EDITION_DEPLOY_TOKEN }}
        run: |
          if [ -z "$EDITION_DEPLOY_TOKEN" ]; then
            echo "No EDITION_DEPLOY_TOKEN secret — skipping public edition publish."
            exit 0
          fi
          [ -f docs/index.html ] || { echo "No docs/index.html to publish."; exit 0; }
          rm -rf /tmp/edition
          git clone "https://x-access-token:${EDITION_DEPLOY_TOKEN}@github.com/clairechabot/canopy-edition.git" /tmp/edition
          cp docs/index.html /tmp/edition/index.html
          # The edition footer links to ./archive.html and ./grove.html, and the
          # Grove/Archive link out to ./editions/* and ./grove.json — so publish
          # the whole linked set, not just index.html, or those pages 404.
          [ -f docs/archive.html ] && cp docs/archive.html /tmp/edition/archive.html
          [ -f docs/grove.html ]   && cp docs/grove.html   /tmp/edition/grove.html
          [ -f docs/grove.json ]   && cp docs/grove.json   /tmp/edition/grove.json
          if [ -d docs/editions ]; then
            mkdir -p /tmp/edition/editions
            cp docs/editions/*.html /tmp/edition/editions/ 2>/dev/null || true
          fi
          cd /tmp/edition
          git config user.name  "newsletter-bot"
          git config user.email "newsletter-bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Edition unchanged — nothing to publish."
          else
            git commit -m "Publish edition ${{ github.run_id }}"
            git push
          fi

      # ── 7c. Verify the public deploy actually went live ──────────────────
      #   GitHub Pages deploys occasionally fail with a transient "try again
      #   later" — usually self-healing, but this makes sure: wait for the
      #   Pages build, check today's edition URL, and re-trigger the build
      #   with an empty commit if it isn't live yet.
      - name: Verify public site deploy
        if: always()
        continue-on-error: true
        env:
          EDITION_DEPLOY_TOKEN: ${{ secrets.EDITION_DEPLOY_TOKEN }}
        run: |
          [ -z "$EDITION_DEPLOY_TOKEN" ] && exit 0
          SLUG="$(date +%F)-$([ "$(date +%H)" -lt 12 ] && echo morning || echo evening)"
          URL="https://clairechabot.github.io/canopy-edition/editions/${SLUG}.html"
          sleep 90
          for i in 1 2 3; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -L "$URL")
            [ "$CODE" = "200" ] && { echo "Live: $URL"; exit 0; }
            echo "Attempt $i: $URL -> $CODE; waiting..."
            sleep 60
          done
          echo "::warning::$URL still not live — re-triggering Pages build."
          rm -rf /tmp/edition-retry
          git clone --depth 1 "https://x-access-token:${EDITION_DEPLOY_TOKEN}@github.com/clairechabot/canopy-edition.git" /tmp/edition-retry
          cd /tmp/edition-retry
          git config user.name  "newsletter-bot"
          git config user.email "newsletter-bot@users.noreply.github.com"
          git commit --allow-empty -m "Retrigger Pages build (deploy verification failed)"
          git push

      # ── 8. Commit history.json + the GitHub Pages "full edition" ─────────
      #   GitHub Pages must be enabled for this repo with
      #   Settings → Pages → Source: "Deploy from a branch", branch: main, folder: /docs
      #   so https://<owner>.github.io/Newsletter/ serves docs/index.html.
      # Non-fatal: the email is the primary deliverable; persisting history/docs
      # must never turn a successful send red. Operates on the CURRENT branch
      # (GITHUB_REF_NAME), not a hardcoded main, so it works pre-merge too.
      # Gated on success() — if the fetch/curate/send failed, the consumed
      # URLs/video-IDs must NOT be committed to history, or that content is
      # marked "seen" without ever having been delivered (lost forever).
      - name: Commit updated history.json and full edition
        if: success()
        continue-on-error: true
        run: |
          git config user.name  "newsletter-bot"
          git config user.email "newsletter-bot@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME}"
          [ -f history.json ]      && git add history.json
          [ -f docs/index.html ]   && git add docs/index.html
          [ -f docs/archive.html ] && git add docs/archive.html
          [ -f docs/grove.html ]   && git add docs/grove.html
          [ -f docs/grove.json ]   && git add docs/grove.json
          [ -d docs/editions ]     && git add docs/editions/
          if git diff --staged --quiet; then
            echo "Nothing changed — nothing to commit."
            exit 0
          fi
          git commit -m "chore: update history.json + edition archive [skip ci]"
          # Rebase onto the latest of THIS branch, preferring our freshly
          # regenerated files on the (rare) conflict.
          git pull --rebase -X ours origin "$BRANCH" || git rebase --abort || true
          git push origin "HEAD:$BRANCH" || echo "::warning::history/docs push skipped"
