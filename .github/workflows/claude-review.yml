name: Claude PR Review

# Advisory AI review of every PR — posts comments, NEVER blocks merge.
#
# Auth: uses a Claude SUBSCRIPTION token (Pro/Max), not API billing.
# Setup (one-time): run `claude setup-token` locally (needs a Claude Pro/Max
#   subscription), then add the result as a repo secret named
#   CLAUDE_CODE_OAUTH_TOKEN under Settings → Secrets and variables → Actions.

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write   # claude-code-action@v1 mints its GitHub token via OIDC

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Auto-review PRs from THIS repo (not forks); on comments, only when @claude is mentioned.
    if: |
      github.event.repository.full_name == github.repository &&
      (
        github.event_name == 'pull_request' ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
      )
    steps:
      - name: Checkout (full history for diff context)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        # ADVISORY only — a review that runs out of turns or hits a transient
        # error must NEVER turn the PR check red.
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Post the review back to the PR as a sticky summary comment.
          track_progress: true
          prompt: |
            Review this pull request for a Python newsletter/digest generator that runs on GitHub Actions.

            Review the PR diff (`git diff --merge-base origin/main`). Look for:
            - Bugs and broken logic (wrong control flow, bad state, async/await mistakes)
            - Anything that would crash the job or break the scheduled GitHub Actions run
            - Source-adapter / parsing correctness (broken selectors, fragile regex, encoding)
            - Secrets or API keys leaked into code or logs; unsafe input handling
            - Silent failures (bare excepts, swallowed errors) that would break a daily run

            Post your findings as PR review comments, grouped BLOCKING / IMPORTANT
            / MINOR, each with path:line, the reason, and a concrete fix. Keep it
            concise — skip nitpicks on style. End with a one-line verdict.

            This is ADVISORY feedback — do NOT fail the check or block merge.
          # Sonnet for cost; cap turns so a single review can't run away on credits.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 30
