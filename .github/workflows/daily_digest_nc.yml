name: North Carolina Edition

# Regional re-send of the primary Curated Canopy for a reader in North Carolina
# (Raleigh / Triangle, US Eastern). It does NOT re-fetch or re-curate — it reuses
# the primary edition's committed curated_data.json, re-localizes "From the Garden",
# The Larder's seasonal food note, and adds a local-news block (WRAL), then emails
# it to the EMAIL_TO_NC list at local morning/evening. No web publish, no history.
#
# Timing: GitHub delays scheduled crons, so these fire early to land near the
# target. 07:00 EDT (UTC-4 summer) = 11:00 UTC → fire 09:23 UTC; 19:00 EDT =
# 23:00 UTC → fire 21:23 UTC. Both slots fire well AFTER the primary edition of
# the same half-day has committed curated_data.json (main runs 03:23 / 14:23 UTC;
# content lands ~06:15 / ~15:55 UTC). Fixed-UTC cron means winter (EST) arrives ~1h earlier.

on:
  schedule:
    - cron: "23 9 * * *"    # ≈ 07:00 US Eastern (morning)
    - cron: "23 21 * * *"   # ≈ 19:00 US Eastern (evening)
  workflow_dispatch:

jobs:
  nc-edition:
    name: North Carolina re-send
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York
      EDITION_TZ: America/New_York
      GARDEN_LOCALE: "Raleigh, North Carolina"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --quiet -r requirements.txt
          pip install --quiet anthropic google-api-python-client python-dateutil requests beautifulsoup4

      - name: Re-localize + send the North Carolina edition
        env:
          CLAUDE_API_KEY:        ${{ secrets.CLAUDE_API_KEY }}
          EMAIL_USER:            ${{ secrets.EMAIL_USER }}
          SMTP_USER:             ${{ secrets.SMTP_USER }}
          SMTP_PASS:             ${{ secrets.SMTP_PASS }}
          SMTP_HOST:             ${{ secrets.SMTP_HOST }}
          SMTP_SERVER:           ${{ secrets.SMTP_SERVER }}
          SMTP_PORT:             ${{ secrets.SMTP_PORT }}
          EMAIL_TO:              ${{ secrets.EMAIL_TO_NC }}
        run: python renderer.py --regional
